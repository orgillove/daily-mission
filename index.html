<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f7b6c">
<title>Daily Mission</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0f7b6c;--green-light:#e9f4f2;--green-dark:#0a5c51;--amber:#d9730d;--amber-light:#fdf3e7;--red:#c0392b;--bg:#f7f6f3;--card:#fff;--border:#e3e2de;--text:#37352f;--muted:#9b9a97}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}

/* Header */
.header{background:var(--green);color:#fff;padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-date{font-size:13px;opacity:.85}
.header-title{font-size:18px;font-weight:700}
.reset-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer}
.progress-bar-bg{height:6px;background:rgba(255,255,255,.3);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:#fff;border-radius:3px;transition:width .4s ease}
.progress-text{font-size:12px;opacity:.9;margin-top:5px;text-align:right}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:88px;z-index:99}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:500;color:var(--muted);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* Content */
.content{padding:0 0 20px}

/* Section */
.section{margin:12px 14px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* Task item */
.task{display:flex;align-items:center;gap:14px;background:var(--card);padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.task:active{background:#f0f0ee}
.task:first-of-type{border-top:1px solid var(--border)}
.task.checked{background:var(--green-light)}
.task-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.task-text{flex:1;font-size:15px;line-height:1.4}
.task-sub{font-size:12px;color:var(--muted);margin-top:1px}
.task.checked .task-text{color:var(--green-dark)}
.checkbox{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.task.checked .checkbox{background:var(--green);border-color:var(--green)}
.checkmark{display:none;color:#fff;font-size:14px;font-weight:700}
.task.checked .checkmark{display:block}

/* Stats cards */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;margin-top:4px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-num{font-size:28px;font-weight:700;color:var(--text)}
.stat-num.g{color:var(--green)}
.stat-num.a{color:var(--amber)}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:2px}

/* Calendar mini */
.cal-wrap{padding:14px}
.cal-month{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.cal-mn{font-size:14px;font-weight:600}
.cal-pct{font-size:13px;color:var(--green);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px}
.cal-dl{font-size:10px;color:var(--muted);text-align:center;padding:2px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .1s}
.cal-day:active{opacity:.7}
.cal-day.today{background:var(--green);color:#fff;font-weight:700}
.cal-day.done{background:var(--green-light);color:var(--green-dark)}
.cal-day.partial{background:var(--amber-light);color:var(--amber)}
.cal-day.dis{opacity:.2;pointer-events:none}
.cal-day.emp{pointer-events:none}

/* Weekly */
.weekly-task{display:flex;align-items:center;gap:14px;background:var(--card);padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.weekly-task:first-of-type{border-top:1px solid var(--border)}
.weekly-task.checked{background:var(--green-light)}
.weekly-task:active{background:#f0f0ee}
.weekly-task.checked .checkbox{background:var(--green);border-color:var(--green)}
.weekly-task.checked .checkmark{display:block}
.week-badge{font-size:11px;background:#e9e9e7;color:#5c5c5a;padding:2px 8px;border-radius:10px;font-weight:500}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;color:var(--muted);-webkit-tap-highlight-color:transparent;transition:color .15s}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;margin-bottom:2px}
.nav-label{font-size:10px;font-weight:500}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#37352f;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-date" id="hdr-date"></div>
      <div class="header-title">✨ Daily Mission</div>
    </div>
    <button class="reset-btn" onclick="resetToday()">Шинэчлэх</button>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-text" id="prog-text">0 / 11 • 0%</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('daily')"><div class="nav-icon">📋</div>Daily</div>
  <div class="tab" onclick="showPage('weekly')"><div class="nav-icon">📊</div>Weekly</div>
  <div class="tab" onclick="showPage('calendar')"><div class="nav-icon">📅</div>Tracker</div>
</div>

<!-- DAILY PAGE -->
<div id="page-daily" class="content">
  <div class="section">🌅 Өглөө</div>
  <div id="tasks-morning"></div>
  <div class="section" style="margin-top:16px">☀️ Өдөр</div>
  <div id="tasks-day"></div>
  <div class="section" style="margin-top:16px">🌙 Орой</div>
  <div id="tasks-evening"></div>
</div>

<!-- WEEKLY PAGE -->
<div id="page-weekly" class="content" style="display:none">
  <div class="section" style="margin-top:12px">📊 7 Хоног бүр — <span class="week-badge" id="week-label"></span></div>
  <div id="weekly-tasks"></div>
  <div class="stats">
    <div class="stat-card"><div class="stat-num g" id="w-done">0</div><div class="stat-lbl">Энэ 7 хоногт</div></div>
    <div class="stat-card"><div class="stat-num" id="w-streak">0🔥</div><div class="stat-lbl">7 хоногийн streak</div></div>
  </div>
</div>

<!-- CALENDAR PAGE -->
<div id="page-calendar" class="content" style="display:none">
  <div class="stats">
    <div class="stat-card"><div class="stat-num g" id="s-pct">0%</div><div class="stat-lbl">Нийт гүйцэтгэл</div></div>
    <div class="stat-card"><div class="stat-num" id="s-streak">0🔥</div><div class="stat-lbl">Streak өдөр</div></div>
    <div class="stat-card"><div class="stat-num g" id="s-done">0</div><div class="stat-lbl">Бүрэн өдөр</div></div>
    <div class="stat-card"><div class="stat-num a" id="s-partial">0</div><div class="stat-lbl">Хэсэгчилсэн</div></div>
  </div>
  <div class="cal-wrap" id="cal-wrap"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TODAY_OBJ = new Date();
const YEAR = 2026;
// For testing use actual today; for 2026 tracker use fixed start
const START = new Date(2026,2,15);

function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

const MORNING = [
  {id:'m1',icon:'🧘‍♀️',text:'Бясалгал',sub:'10–15 минут'},
  {id:'m2',icon:'🧘‍♀️',text:'ENERGY SCAN — өглөө',sub:'Өглөөний байдлаа шалга'},
  {id:'m3',icon:'💧',text:'Ус уух + ор дэрээ эмхлэх',sub:''},
];
const DAY = [
  {id:'d1',icon:'📖',text:'Ном унших',sub:'5–10 хуудас'},
  {id:'d2',icon:'🗣',text:'English',sub:'5 мин – 1 цаг'},
  {id:'d3',icon:'📈',text:'Forex хичээл',sub:'5–60 минут'},
  {id:'d4',icon:'💪',text:'Дасгал хийх',sub:'5–30 минут'},
  {id:'d5',icon:'🍽',text:'Mindful eating',sub:'80% хүртэл идэх'},
  {id:'d6',icon:'🧹',text:'Өрөө цэвэрлэх',sub:'Хувийн орон зайгаа арчлах'},
  {id:'d7',icon:'🧘‍♀️',text:'ENERGY SCAN — өдөр',sub:'Өдрийн байдлаа шалга'},
];
const EVENING = [
  {id:'e1',icon:'💭',text:'Бодол бичих / Тэмдэглэл',sub:''},
  {id:'e2',icon:'🧘‍♀️',text:'ENERGY SCAN — орой',sub:'Оройн байдлаа шалга'},
  {id:'e3',icon:'🌙',text:'FINAL PRACTICE',sub:''},
  {id:'e4',icon:'💤',text:'7~8 цаг унтах',sub:''},
];
const WEEKLY_LIST = [
  {id:'w1',icon:'📊',text:'Мөнгөний менежментээ шалгах'},
  {id:'w2',icon:'🌌',text:'DEEP AFFIRMATION PRACTICE'},
  {id:'w3',icon:'💬',text:'Найз/гэр бүлтэй чанартай харилцах'},
  {id:'w4',icon:'✍️',text:'Өөрийгөө үнэлэх / Reflection'},
];
const ALL_TASKS = [...MORNING,...DAY,...EVENING];
const N = ALL_TASKS.length;

let data={};
try{const s=localStorage.getItem('dm2026');if(s)data=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('dm2026',JSON.stringify(data));}catch(e){}}

function getDay(key){return data[key]||{};}
function setTask(key,id,val){if(!data[key])data[key]={};data[key][id]=val;save();}
function countDone(key){const d=getDay(key);return ALL_TASKS.filter(t=>d[t.id]).length;}
function stateOf(key){const c=countDone(key);if(c===0)return'empty';if(c===N)return'done';return'partial';}

// Weekly key = monday of week
function weekKey(d){const dt=new Date(d||Date.now());const day=dt.getDay()||7;dt.setDate(dt.getDate()-day+1);return dateKey(dt.getFullYear(),dt.getMonth(),dt.getDate());}

function buildTask(task, key, container){
  const div=document.createElement('div');
  const checked=!!(getDay(key)[task.id]);
  div.className='task'+(checked?' checked':'');
  div.innerHTML=`<div class="task-icon">${task.icon}</div>
    <div style="flex:1"><div class="task-text">${task.text}</div>${task.sub?`<div class="task-sub">${task.sub}</div>`:''}</div>
    <div class="checkbox"><span class="checkmark">✓</span></div>`;
  div.onclick=()=>{
    const now=!!(getDay(key)[task.id]);
    setTask(key,task.id,!now);
    div.classList.toggle('checked',!now);
    const cb=div.querySelector('.checkbox');
    cb.style.background=!now?'var(--green)':'';
    cb.style.borderColor=!now?'var(--green)':'var(--border)';
    div.querySelector('.checkmark').style.display=!now?'block':'none';
    updateProgress();
    if(!now) showToast(task.text+' ✓');
  };
  container.appendChild(div);
}

function renderDaily(){
  const key=todayKey();
  ['tasks-morning','tasks-day','tasks-evening'].forEach(id=>document.getElementById(id).innerHTML='');
  MORNING.forEach(t=>buildTask(t,key,document.getElementById('tasks-morning')));
  DAY.forEach(t=>buildTask(t,key,document.getElementById('tasks-day')));
  EVENING.forEach(t=>buildTask(t,key,document.getElementById('tasks-evening')));
  updateProgress();
}

function updateProgress(){
  const key=todayKey();
  const done=countDone(key);
  const pct=Math.round(done/N*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done} / ${N} • ${pct}%`;
}

function renderWeekly(){
  const wk=weekKey();
  const container=document.getElementById('weekly-tasks');
  container.innerHTML='';
  if(!data['weekly'])data['weekly']={};
  const wd=data['weekly'][wk]||{};
  WEEKLY_LIST.forEach(task=>{
    const div=document.createElement('div');
    const checked=!!wd[task.id];
    div.className='weekly-task'+(checked?' checked':'');
    div.innerHTML=`<div class="task-icon">${task.icon}</div>
      <div style="flex:1"><div class="task-text">${task.text}</div></div>
      <div class="checkbox"><span class="checkmark">✓</span></div>`;
    div.onclick=()=>{
      if(!data['weekly'])data['weekly']={};
      if(!data['weekly'][wk])data['weekly'][wk]={};
      const now=!!data['weekly'][wk][task.id];
      data['weekly'][wk][task.id]=!now;
      save();
      div.classList.toggle('checked',!now);
      const cb=div.querySelector('.checkbox');
      cb.style.background=!now?'var(--green)':'';
      cb.style.borderColor=!now?'var(--green)':'var(--border)';
      div.querySelector('.checkmark').style.display=!now?'block':'none';
      updateWeeklyStats();
      if(!now) showToast(task.text+' ✓');
    };
    container.appendChild(div);
  });
  // Week label
  const wdate=new Date(wk);
  const wend=new Date(wdate);wend.setDate(wend.getDate()+6);
  document.getElementById('week-label').textContent=`${wdate.getMonth()+1}/${wdate.getDate()} — ${wend.getMonth()+1}/${wend.getDate()}`;
  updateWeeklyStats();
}

function updateWeeklyStats(){
  const wk=weekKey();
  const wd=(data['weekly']&&data['weekly'][wk])||{};
  const done=WEEKLY_LIST.filter(t=>wd[t.id]).length;
  document.getElementById('w-done').textContent=done+'/'+WEEKLY_LIST.length;
  // streak
  let streak=0;
  let d=new Date();
  for(let i=0;i<52;i++){
    const wk2=weekKey(d);
    const wd2=(data['weekly']&&data['weekly'][wk2])||{};
    if(WEEKLY_LIST.some(t=>wd2[t.id]))streak++;
    else if(i>0)break;
    d.setDate(d.getDate()-7);
  }
  document.getElementById('w-streak').textContent=streak+'🔥';
}

function renderCalendar(){
  const wrap=document.getElementById('cal-wrap');wrap.innerHTML='';
  const MONTHS=['1-р','2-р','3-р','4-р','5-р','6-р','7-р','8-р','9-р','10-р','11-р','12-р'];
  const DL=['Да','Мя','Лх','Пү','Ба','Бя','Ня'];
  const now=new Date();
  for(let m=2;m<=11;m++){
    const dim=new Date(2026,m+1,0).getDate();
    let total=0,done=0,partial=0;
    for(let d=1;d<=dim;d++){
      if(m===2&&d<15)continue;
      total++;const s=stateOf(dateKey(2026,m,d));
      if(s==='done')done++;else if(s==='partial')partial++;
    }
    const pct=total?Math.round((done+partial*.5)/total*100):0;
    const block=document.createElement('div');block.className='cal-month';
    const hdr=document.createElement('div');hdr.className='cal-hdr';
    hdr.innerHTML=`<span class="cal-mn">2026 · ${MONTHS[m]} сар</span><span class="cal-pct">${pct}%</span>`;
    block.appendChild(hdr);
    const grid=document.createElement('div');grid.className='cal-grid';
    DL.forEach(dl=>{const e=document.createElement('div');e.className='cal-dl';e.textContent=dl;grid.appendChild(e);});
    const offset=(new Date(2026,m,1).getDay()+6)%7;
    for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='cal-day emp';grid.appendChild(e);}
    for(let d=1;d<=dim;d++){
      const k=dateKey(2026,m,d);
      const dt=new Date(2026,m,d);
      const isT=dt.toDateString()===now.toDateString();
      const st=stateOf(k);
      const cell=document.createElement('div');
      let cls='cal-day';
      if(m===2&&d<15)cls+=' dis';
      else if(isT)cls+=' today';
      else if(st==='done')cls+=' done';
      else if(st==='partial')cls+=' partial';
      cell.className=cls;cell.textContent=d;
      grid.appendChild(cell);
    }
    block.appendChild(grid);wrap.appendChild(block);
  }
  updateCalStats();
}

function updateCalStats(){
  let total=0,done=0,partial=0,streak=0;
  for(let m=2;m<=11;m++){
    const dim=new Date(2026,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      if(m===2&&d<15)continue;
      total++;const s=stateOf(dateKey(2026,m,d));
      if(s==='done')done++;else if(s==='partial')partial++;
    }
  }
  // streak
  const now=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const s=stateOf(k);
    if(s==='done'||s==='partial')streak++;
    else if(i>0)break;
  }
  const pct=total?Math.round((done+partial*.5)/total*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-partial').textContent=partial;
  document.getElementById('s-streak').textContent=streak+'🔥';
}

function showPage(id){
  ['daily','weekly','calendar'].forEach(p=>{
    document.getElementById('page-'+p).style.display=p===id?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['daily','weekly','calendar'][i]===id);
  });
  if(id==='weekly')renderWeekly();
  if(id==='calendar')renderCalendar();
}

function resetToday(){
  if(!confirm('Өнөөдрийн бүх чагтыг арилгах уу?'))return;
  const key=todayKey();
  delete data[key];save();renderDaily();
  showToast('Шинэчлэгдлээ');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Header date
const days=['Ням','Даваа','Мягмар','Лхагва','Пүрэв','Баасан','Бямба'];
const months=['1-р','2-р','3-р','4-р','5-р','6-р','7-р','8-р','9-р','10-р','11-р','12-р'];
const now=new Date();
document.getElementById('hdr-date').textContent=`${now.getFullYear()} · ${months[now.getMonth()]} сарын ${now.getDate()} · ${days[now.getDay()]}`;

renderDaily();
</script>
</body>
</html>
